# Regenerates the profile's animated SVGs from live GitHub data.
#
# TOKEN NOTE: the built-in GITHUB_TOKEN is scoped to THIS repository only, so it
# cannot see the other repos or private contributions — with it, the stats render
# public-only numbers. To count private work, create a fine-grained PAT with
# read access to all repositories plus user metadata, and save it as the repo
# secret PROFILE_TOKEN. The scripts degrade gracefully either way.
#
# subset-font.sh is deliberately NOT run here: it reads the brand font from
# ~/chin/brand, which only exists on the author's machine. The subset is
# committed as tools/jetbrains-mono-subset.b64 and regenerated by hand when the
# glyph set changes.
name: refresh

on:
  schedule:
    # 06:17 UTC daily — off the hour, since scheduled jobs bunch up on it.
    - cron: "17 6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - profile.json
      - tools/**
      - .github/workflows/refresh.yml

permissions:
  contents: write

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build hero
        run: node tools/build-hero.mjs

      # Fail loudly rather than publish a worse profile. A token that cannot see
      # private repositories yields 7 repos instead of 17 and drops Python — the
      # largest language by a factor of four — off the chart entirely. That
      # degradation is invisible in a green check mark, so it gets asserted here.
      - name: Verify the token can see private repositories
        env:
          GITHUB_TOKEN: ${{ secrets.PROFILE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          n=$(gh api graphql -f query='{viewer{repositories(first:100,ownerAffiliations:OWNER,isFork:false){nodes{isPrivate}}}}' \
                --jq '[.data.viewer.repositories.nodes[]|select(.isPrivate)]|length')
          echo "private repositories visible: $n"
          if [ "$n" -lt 1 ]; then
            echo "::error::Token sees no private repositories, so the stats would understate the profile. Refusing to regenerate. Fix: create a fine-grained PAT scoped to *All repositories* with Contents:Read and Metadata:Read, and save it as the PROFILE_TOKEN secret."
            exit 1
          fi

      - name: Render stats and contribution grid
        env:
          GITHUB_TOKEN: ${{ secrets.PROFILE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          node tools/render-stats.mjs
          node tools/render-grid.mjs

      - name: Stamp last-updated
        run: |
          today="$(date -u +%Y-%m-%d)"
          perl -0pi -e "s{(<!--UPDATED-->).*?(<!--/UPDATED-->)}{\${1}${today}\${2}}s" README.md

      - name: Commit if anything changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- assets README.md; then
            echo "no changes to commit"
            exit 0
          fi
          git add assets README.md
          git commit -m "chore: refresh profile stats"
          git push
